name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Fixture + refusal evals (blocking gate)
        run: npm run eval
      - name: Live smoke evals (upstream health, non-blocking)
        run: npm run eval:live
        continue-on-error: true
